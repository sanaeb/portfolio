<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070a"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="55%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Status badge top -->
  <g transform="translate(80, 90)">
    <rect width="380" height="44" rx="22" fill="#0f0f15" stroke="#2a2a35" stroke-width="1"/>
    <circle cx="28" cy="22" r="5" fill="#10b981"/>
    <text x="48" y="29" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#fafafa">Open to work · Senior · Lyon ou remote</text>
  </g>

  <!-- Name -->
  <text
    x="80"
    y="290"
    font-family="Inter, system-ui, sans-serif"
    font-size="120"
    font-weight="700"
    letter-spacing="-5"
    fill="#fafafa"
  >Sanae</text>
  <text
    x="80"
    y="410"
    font-family="Inter, system-ui, sans-serif"
    font-size="120"
    font-weight="700"
    letter-spacing="-5"
    fill="url(#nameGrad)"
  >Boutarfass.</text>

  <!-- Subtitle -->
  <text
    x="80"
    y="480"
    font-family="Inter, system-ui, sans-serif"
    font-size="28"
    fill="#a1a1aa"
  >Développeuse Full Stack senior à Lyon</text>
  <text
    x="80"
    y="520"
    font-family="Inter, system-ui, sans-serif"
    font-size="22"
    fill="#71717a"
  >10 ans · Java/Spring · React/TypeScript · Python</text>

  <!-- SB Logo top right -->
  <g transform="translate(1060, 80)">
    <rect width="64" height="64" rx="14" fill="url(#logoGrad)"/>
    <rect x="2" y="2" width="60" height="60" rx="12" fill="#07070a"/>
    <text
      x="32"
      y="42"
      text-anchor="middle"
      font-family="Inter, system-ui, sans-serif"
      font-size="28"
      font-weight="700"
      letter-spacing="-1.2"
      fill="#ffffff"
    >SB</text>
  </g>

  <!-- Bottom URL/identifier -->
  <text
    x="80"
    y="580"
    font-family="ui-monospace, 'JetBrains Mono', monospace"
    font-size="14"
    fill="#52525b"
    letter-spacing="2"
  >SANAEBOUTARFASS.DEV</text>
</svg>
